name: linux/amd64

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

  repository_dispatch: # Allows action to be triggered via webhook

  workflow_dispatch: # Allows action to be run manually from the Actions tab

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Install tmux
        run: |
          sudo apt-get update
          sudo apt-get install --yes tmux
      - name: Pull Latest Linux Base Image
        run: docker pull lacledeslan/gamesvr-hl2dm
      - name: Build Linux Image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: ./linux.Dockerfile
          tags: |
            lacledeslan/gamesvr-hl2dm-freeplay:latest
            ghcr.io/lacledeslan/gamesvr-hl2dm-freeplay:latest
          build-args: |
            BUILDNODE=GitHub (Run Number: ${{ github.run_number }} Run ID: ${{ github.run_id }})
            SOURCE_COMMIT=${{ github.sha }}
          no-cache: true
          load: true
      - name: Test Linux Image
        run: ./tests/gamesvr-hl2dm-freeplay.sh lacledeslan/gamesvr-hl2dm-freeplay /app/srcds_run -game hl2mp +map dm_fool_day -insecure -norestart +sv_lan 1
      - name: Login to DockerHub
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v4.5.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v4.5.0
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Push to Docker HUB
        if: ${{ github.event_name != 'pull_request' }}
        run: docker push lacledeslan/gamesvr-hl2dm-freeplay:latest
      - name: Push to GitHub Packages
        if: ${{ github.event_name != 'pull_request' }}
        run: docker push ghcr.io/lacledeslan/gamesvr-hl2dm-freeplay:latest
